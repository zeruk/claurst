name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., v0.1.1). Must already exist as a GitHub Release.'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    name: Publish claurst@${{ inputs.version }} to npm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to latest (for trusted publishing)
        run: npm install -g npm@11 --force

      - name: Set npm package version
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('npm/package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('npm/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Publishing claurst@${VERSION}"

      - name: Publish to npm
        working-directory: npm
        run: npm publish --access public --provenance
